<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼字小勇士</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗡️ 拼字小勇士 🛡️</h1>
            <div class="player-info">
                <input type="text" id="playerName" placeholder="輸入你的名字" value="小勇士">
                <button onclick="startGame()">登入 / 開始</button>
            </div>
            
            <!-- 👇 新增：測驗設定區域 👇 -->
            <div class="settings">
                <div>
                    <label>📍 測驗範圍：第</label>
                    <input type="number" id="startIdx" value="1" min="1">
                    <label>到</label>
                    <input type="number" id="endIdx" value="510" min="1">
                    <label>題</label>
                </div>
                <div class="toggle-setting">
                    <label>
                        <input type="checkbox" id="autoNext" checked> ⏱️ 答完自動切換下一題
                    </label>
                </div>
            </div>

            <!-- 上傳單字庫區域 -->
            <div class="upload-area" id="uploadArea" style="display: none;">
                <label for="uploadCsv" class="upload-btn">📂 上傳新進度 (CSV)</label>
                <input type="file" id="uploadCsv" accept=".csv" style="display: none;" onchange="handleFileUpload(event)">
                <div id="uploadStatus" class="upload-status"></div>
            </div>
        </header>

        <main id="gameArea" style="display: none;">
            <div class="stats">
                <span>🏆 分數: <span id="score">0</span></span>
                <button id="bossBtn" onclick="startBossBattle()" style="display: none;">👿 挑戰魔王</button>
                <button id="exportBtn" onclick="exportMistakes()">📥 下載錯題</button>
            </div>

            <div class="question-box">
                <h2 id="chineseHint">準備中...</h2>
                <button onclick="speakWord()" class="sound-btn">🔊 聽發音</button>
            </div>

            <div class="input-area">
                <input type="text" id="englishInput" placeholder="請輸入英文" autocomplete="off" onkeypress="handleEnter(event)">
                <button id="submitBtn" onclick="checkAnswer()">送出攻擊 ⚔️</button>
                <!-- 👇 新增：手動下一題按鈕 (預設隱藏) 👇 -->
                <button id="nextBtn" onclick="nextQuestion()" style="display: none;">➡️ 下一題</button>
            </div>

            <p id="feedbackMsg" class="feedback"></p>
        </main>
    </div>

    <!-- 載入單字庫與遊戲邏輯 -->
    <script src="words.js"></script>
    <script src="game.js"></script>
</body>
</html>
